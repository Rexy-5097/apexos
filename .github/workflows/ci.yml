name: ApexOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type Check · Lint · Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Verify no owner references
        run: |
          result=$(grep -ri "simplifaisoul\|aiacos\|ito69\|osiris" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.next \
            --exclude-dir=.github \
            --exclude="LICENSE" \
            --exclude="NOTICE.md" \
            --exclude="*.md" 2>/dev/null || true)
          if [ -n "$result" ]; then
            echo "❌ Owner references found:"
            echo "$result"
            exit 1
          fi
          echo "✅ No owner references found"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: apexos:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect apexos:ci-${{ github.sha }} \
            --format='{{.Size}}' 2>/dev/null || echo "0")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 280 ]; then
            echo "❌ Image exceeds 280MB limit: ${SIZE_MB}MB"
            exit 1
          fi
          echo "✅ Image size within limit: ${SIZE_MB}MB"
